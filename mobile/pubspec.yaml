name: mobile
description: "FinTrack Mobile Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP Client
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^16.0.0

  # Chart
  fl_chart: ^1.0.0

  # Utilities
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
